# =============================================================================
# Valtheron CyberSec AI Agent Stack
# Local LLM + Dual Agent Setup (Stopoda + Costraca) + Open-WebUI
# Security-hardened, fully offline, no cloud dependencies
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # Ollama - Local LLM Backend (shared by both agents)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-shared
    restart: unless-stopped
    ports:
      - "127.0.0.1:11435:11434"  # Host port 11435 to avoid conflict with system Ollama on 11434
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 32G
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_KEEP_ALIVE=24h
    networks:
      - agent_net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Open-WebUI - Chat Interface (shared, connects to Ollama)
  # ---------------------------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change_this_secret_key_immediately}
      - WEBUI_AUTH=true
      - ENABLE_SIGNUP=false
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - agent_net
    # Read-only root FS with explicit writable mounts
    read_only: false
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # Agent Zero (Stopoda) - Primary Agent
  # Model: qwen2.5-coder:7b-instruct-q4_K_M (~4.5GB VRAM)
  # WebUI: localhost:8080
  # ---------------------------------------------------------------------------
  stopoda:
    image: frdel/agent-zero-run:latest
    container_name: stopoda-agent
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./stopoda:/a0
      - ./stopoda/tools:/a0/tools:ro
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_MODEL=qwen2.5-coder:7b-instruct-q4_K_M
      - DEFAULT_EMBEDDING_MODEL=nomic-embed-text
      - AGENT_NAME=Stopoda
      - AGENT_ROLE=primary_security_analyst
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - agent_net
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G

  # ---------------------------------------------------------------------------
  # Agent Zero (Costraca) - Secondary Agent
  # Model: qwen2.5-coder:7b-instruct-q4_K_M (~4.5GB VRAM)
  # WebUI: localhost:8081
  # ---------------------------------------------------------------------------
  costraca:
    image: frdel/agent-zero-run:latest
    container_name: costraca-agent
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./costraca:/a0
      - ./costraca/tools:/a0/tools:ro
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_MODEL=qwen2.5-coder:7b-instruct-q4_K_M
      - DEFAULT_EMBEDDING_MODEL=nomic-embed-text
      - AGENT_NAME=Costraca
      - AGENT_ROLE=secondary_recon_executor
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - agent_net
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 16G

  # ---------------------------------------------------------------------------
  # OpenClaw - Personal AI Agent via Claude API (Messaging: Telegram, Discord, etc.)
  # WebUI: localhost:18789
  # Requires: ANTHROPIC_API_KEY in .env
  # First-time setup: docker compose run --rm openclaw-cli openclaw onboard
  # ---------------------------------------------------------------------------
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:18790:18789"
    volumes:
      - openclaw_data:/home/node
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENCLAW_SANDBOX=true
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_API_KEY=ollama
    networks:
      - agent_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18789/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    network_mode: "service:openclaw"
    volumes:
      - openclaw_data:/home/node
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    profiles:
      - cli
    depends_on:
      - openclaw

  # ---------------------------------------------------------------------------
  # ChromaDB - Local Vector Database for RAG (optional)
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
      - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_TOKEN:-change_this_token}
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token.TokenAuthServerProvider
    networks:
      - agent_net
    security_opt:
      - no-new-privileges:true

networks:
  agent_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  ollama_data:
  openwebui_data:
  chromadb_data:
  openclaw_data:
